baseURL = "https://flysolo.me/"
locale = "en-US"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
title = "FlySolo"
theme = ["hugo-brewm", "hugo-book"]
enableRobotsTXT = true
disablePathToLower = true

[params]
  description = "FlySolo helps independent professionals move from proposal to payment with Otto when a client asks for a proposal, pricing needs backing, scope needs checking, signatures are due, Moneybird invoices need preparing, and payment follow-up is next."
  keywords = ["FlySolo", "Otto AI agent", "freelancers", "independent professionals", "ZZP", "freelance proposal", "rate checker", "scope check", "e-signature", "Moneybird", "proposal confidence"]
  images = "/images/flysolo.png"
  extMeta = false
  DisableFootBar = false

  primaryColor = "#4F46E5"
  secondaryColor = "#14B8A6"
  accentColor = "#38BDF8"
  backgroundColor = "#0B1220"
  textColor = "#F9FAFB"

  customCSS = ["css/custom.css"]
  BookTheme = "dark"
  BookToC = true
  BookLogo = "images/flysolo-icon-gradient.svg"
  BookFavicon = "images/flysolo-favicon.svg"
  BookSection = "wiki"
  BookSearch = true
  BookComments = false
  BookRepo = ""
  BookEditLink = ""
  BookDateFormat = "January 2, 2006"
  unifiedFooter = true
  copyright = "FlySolo"

[params.author]
  name = "FlySolo"
  email = "hello@flysolo.me"

[params.favicon]
  ico = "/images/flysolo-favicon.svg"
  png = "/images/flysolo-app-icon-dark.svg"
  apple = "/images/flysolo-app-icon-dark.svg"

[params.logo]
  logoMark = "/images/flysolo-icon-gradient.svg"
  logoMarkDark = "/images/flysolo-icon-gradient.svg"
  logoType = false

[params.socialCard]
  enable = true
  opengraph = false
  twitter = false
  images = "/images/flysolo.png"

[params.seo]
  siteName = "FlySolo"
  title = "FlySolo - Win freelance projects from proposal to payment"
  description = "AI deal workflow for independent professionals when a lead arrives, pricing needs backing, scope needs checking, signatures are due, a Moneybird invoice must be prepared, and payment follow-up is next."
  image = "/images/flysolo.png"

[params.home]
  disableSlide = true
  disableListing = true

[params.posts]
  share = false
  related = false
  noIndent = false
  justifying = false

[params.search]
  enable = false

[params.typeface]
  webSafe = false
  localHost = false
  serif = "Cormorant"
  sans = "Montserrat"

[languages]
  [languages.en]
    label = "English"
    locale = "en-US"
    title = "FlySolo"
    weight = 1

    [[languages.en.menu.main]]
      name = "Features"
