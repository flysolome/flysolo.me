[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 1

[module]
  [[module.imports]]
    path = 'github.com/hugomods/icons/vendors/bootstrap'
  [[module.imports]]
    path = 'github.com/hugomods/icons/vendors/font-awesome'
