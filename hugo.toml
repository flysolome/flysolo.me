baseURL = "https://flysolo.me/"
languageCode = "en-us"
title = "FlySolo"
theme = ["hugo-brewm", "hugo-book"]
enableRobotsTXT = true
disablePathToLower = true

[params]
  description = "FlySolo helps senior Dutch tech freelancers turn leads into professional proposals, defensible rates, signed contracts, invoices, and payment follow-up."
  keywords = ["FlySolo", "freelancer operating system", "AI proposals", "Dutch freelancers", "ZZP", "DevOps freelancer", "cloud architect", "security consultant", "Moneybird", "freelance proposal", "pricing intelligence"]
  images = "/images/flysolo.png"
  extMeta = false
  DisableFootBar = false

  primaryColor = "#4F46E5"
  secondaryColor = "#14B8A6"
  accentColor = "#38BDF8"
  backgroundColor = "#0B1220"
  textColor = "#F9FAFB"

  customCSS = ["css/custom.css"]
  BookTheme = "dark"
  BookToC = true
  BookLogo = "images/flysolo-icon-gradient.svg"
  BookFavicon = "images/flysolo-favicon.svg"
  BookSection = "wiki"
  BookSearch = true
  BookComments = false
  BookRepo = ""
  BookEditLink = ""
  BookDateFormat = "January 2, 2006"
  unifiedFooter = true
  copyright = "FlySolo"

[params.author]
  name = "FlySolo"
  email = "hello@flysolo.me"

[params.favicon]
  ico = "/images/flysolo-favicon.svg"
  png = "/images/flysolo-app-icon-dark.svg"
  apple = "/images/flysolo-app-icon-dark.svg"

[params.logo]
  logoMark = "/images/flysolo-icon-gradient.svg"
  logoMarkDark = "/images/flysolo-icon-gradient.svg"
  logoType = false

[params.socialCard]
  enable = true
  opengraph = false
  twitter = false
  images = "/images/flysolo.png"

[params.seo]
  siteName = "FlySolo"
  title = "FlySolo - AI deal workflow for freelancers"
  description = "From lead to signed contract, invoice, and payment. Built first for senior Dutch tech freelancers."
  image = "/images/flysolo.png"

[params.home]
  disableSlide = true
  disableListing = true

[params.posts]
  share = false
  related = false
  noIndent = false
  justifying = false

[params.search]
  enable = false

[params.typeface]
  webSafe = false
  localHost = false
  serif = "Cormorant"
  sans = "Montserrat"

