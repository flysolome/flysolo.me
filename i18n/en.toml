[feature_1_body]
other = "Otto turns a rough opportunity, recruiter brief, or intake note into a professional Dutch proposal with clear deliverables, milestones, assumptions, and next steps."

[feature_2_title]
other = "Rate confidence"

[feature_2_body]
other = "Otto helps you answer the question that matters: am I charging enough? Get rate ranges, rationale, negotiation room, and underpricing warnings."

[feature_3_title]
other = "Scope and contract risk"

[feature_3_body]
other = "Otto flags vague scope, missing assumptions, weak exclusions, payment terms, and contract language for human approval before anything is sent."

[feature_4_title]
other = "Moneybird readiness"

[feature_4_body]
