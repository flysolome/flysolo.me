[problem_kicker]
other = "The commercial gap"

[problem_title]
other = "Freelancers win interest, then lose time turning it into something a client can approve."

[problem_body_1]
other = "Leads arrive through email, LinkedIn, recruiters, referrals, and calls. Proposals live in old documents. Pricing happens from gut feel. Scope risk hides in vague requirements. Invoices happen later in Moneybird or another tool."

[problem_body_2]
other = "Otto connects those moments inside FlySolo, so a lead from a real buyer can become a proposal with deliverables, a signed agreement, an e-signature request, an invoice, and paid work without scattered tools."

[smooth_kicker]
other = "When the work is scattered"

[smooth_title]
other = "FlySolo gives every deal step a place to go."

[smooth_body]
other = "Bring the loose parts of an opportunity: the client note, rate question, scope risk, and invoice handoff. Otto lines them up by next action, so you know whether to ask a question, send the proposal, adjust the rate, confirm terms, or prepare the invoice."

