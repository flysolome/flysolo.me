[feature_1_title]
other = "When the proposal has to leave today"

[feature_1_body]
other = "Otto turns a rough opportunity, recruiter brief, or intake note into a proposal with deliverables, milestones, assumptions, unanswered questions, and the next email to send."

[feature_2_title]
other = "When the client asks for your rate"

[feature_2_body]
other = "Otto helps you answer the question that matters: am I charging enough for this client, scope, urgency, and risk? Get rate ranges, rationale, negotiation room, and warnings when the work looks underpriced."

[feature_3_title]
other = "When the scope is vague"

[feature_3_body]
other = "Otto flags vague requirements, missing assumptions, weak exclusions, payment terms, and contract language before you send something the client might treat as a commitment."

[feature_4_title]
other = "When the deal becomes admin"

[feature_4_body]
other = "After the client says yes, Otto prepares the signature request, invoice details, and payment follow-up so the handoff to Moneybird starts from the accepted work."

