[problem_kicker]
other = "The commercial gap"

[problem_title]
other = "Senior freelancers win interest, then lose time turning it into a clean deal."

[problem_body_1]
other = "Tech leads arrive through email, LinkedIn, recruiters, referrals, and calls. Proposals live in old documents. Pricing happens from gut feel. Scope risk hides in vague requirements. Invoices happen later in Moneybird or another tool."

[problem_body_2]
other = "Otto connects those moments inside FlySolo, so a serious lead can become a professional Dutch proposal, signed agreement, e-signature, invoice, and paid project without scattered tools."

