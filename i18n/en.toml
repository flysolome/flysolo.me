[time_kicker]
other = "Why now"

[time_title]
other = "While a proposal sits unfinished, another freelancer can answer."

[time_body]
other = "A lead that felt urgent on Monday can go quiet by Thursday. The longer a proposal sits unfinished, the more room there is for another freelancer to answer the open questions, name a price, and make the next step obvious."

[time_body_2]
other = "FlySolo is for that window between first interest and lost momentum: capture the request, shape the offer, check the rate, and send the next step while the client is still paying attention."

