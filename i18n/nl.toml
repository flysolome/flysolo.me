[time_body]
other = "Een warme lead verliest snel kracht. Hoe langer een voorstel blijft liggen, hoe meer ruimte er is voor een andere freelancer om helder te antwoorden, zeker te prijzen en de volgende stap makkelijk te maken."

[time_body_2]
other = "FlySolo is gebouwd voor dat korte moment: leg de aanvraag vast, scherp het aanbod aan, bescherm je tarief en beweeg voordat het momentum weg is."

