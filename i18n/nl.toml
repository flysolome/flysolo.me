[time_title]
other = "Terwijl een voorstel blijft liggen, kan een andere freelancer antwoorden."

[time_body]
other = "Een lead die maandag urgent voelde, kan donderdag stilvallen. Hoe langer een voorstel blijft liggen, hoe meer ruimte er is voor een andere freelancer om de open vragen te beantwoorden, een prijs te noemen en de volgende stap duidelijk te maken."

[time_body_2]
other = "FlySolo is voor het moment tussen eerste interesse en verloren momentum: leg de aanvraag vast, vorm het aanbod, check het tarief en stuur de volgende stap terwijl de klant nog oplet."

