[problem_title]
other = "Freelancers krijgen interesse, maar verliezen tijd om er iets van te maken dat een klant kan goedkeuren."

[problem_body_1]
other = "Leads komen binnen via e-mail, LinkedIn, recruiters, referrals en calls. Voorstellen staan in oude documenten. Tarieven worden vaak op gevoel bepaald. Scope-risico zit verstopt in vage requirements. Facturen komen later pas in Moneybird of een andere tool."

[problem_body_2]
other = "Otto verbindt die momenten in FlySolo, zodat een lead van een echte koper kan worden omgezet in een voorstel met deliverables, een getekende afspraak, een e-signature-verzoek, een factuur en betaald werk zonder losse tools."

[smooth_kicker]
other = "Wanneer het werk verspreid ligt"

[smooth_title]
other = "FlySolo geeft elke dealstap een plek."

[smooth_body]
other = "Breng de losse onderdelen van een kans mee: de klantnotitie, tariefvraag, scope-risico en factuuroverdracht. Otto zet ze op volgorde van volgende actie, zodat je weet of je een vraag moet stellen, het voorstel moet sturen, het tarief moet aanpassen, voorwaarden moet bevestigen of de factuur moet voorbereiden."

[smooth_diagram_label]
