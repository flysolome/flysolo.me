[feature_1_title]
other = "Wanneer het voorstel vandaag weg moet"

[feature_1_body]
other = "Otto zet een ruwe aanvraag, recruiterbriefing of intake-notitie om in een voorstel met deliverables, mijlpalen, aannames, open vragen en de volgende mail aan de klant."

[feature_2_title]
other = "Wanneer de klant je tarief vraagt"

[feature_2_body]
other = "Otto helpt je de belangrijkste vraag beantwoorden: vraag ik genoeg voor deze klant, scope, deadline en risico? Krijg tariefbanden, onderbouwing, onderhandelingsruimte en waarschuwingen wanneer het werk onderprijsd lijkt."

[feature_3_title]
other = "Wanneer de scope vaag is"

[feature_3_body]
other = "Otto signaleert vage requirements, ontbrekende aannames, zwakke uitsluitingen, betalingstermijnen en contracttaal voordat je iets stuurt dat de klant als toezegging kan lezen."

[feature_4_title]
other = "Wanneer de deal admin wordt"

[feature_4_body]
other = "Nadat de klant ja zegt, bereidt Otto het handtekeningverzoek, de factuurgegevens en betaalopvolging voor, zodat de overdracht naar Moneybird start vanuit het geaccepteerde werk."

