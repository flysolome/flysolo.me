other = "Freelancers krijgen interesse, maar verliezen tijd om er een nette deal van te maken."

[problem_body_1]
other = "Leads komen binnen via e-mail, LinkedIn, recruiters, referrals en calls. Voorstellen staan in oude documenten. Tarieven worden vaak op gevoel bepaald. Scope-risico zit verstopt in vage requirements. Facturen komen later pas in Moneybird of een andere tool."

[problem_body_2]
other = "Otto verbindt die momenten in FlySolo, zodat een serieuze lead een professioneel voorstel, getekende overeenkomst, e-signature, factuur en betaalde opdracht kan worden zonder losse tools."

[time_kicker]
other = "Waarom nu"

